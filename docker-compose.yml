# Sevant Registry — one-line start
#
#   curl -L https://releases.sevant.ai -o docker-compose.yml && docker compose up
#
# Then open http://localhost:3000  (nginx routes API calls to the backend)
#
# Optional: create a .env in this directory to set:
#   LICENSE_KEY=<your-signed-license-key>
#   JWT_SECRET=<random-secret-for-production>
# Without LICENSE_KEY the app runs in free-plan mode.

services:
  mongodb:
    image: mongo:6.0
    container_name: sevant-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: sevant
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - sevant-network

  backend:
    image: analyticsavant/sevant-registry-backend:latest
    container_name: sevant-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: "0.0.0.0"
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/sevant?authSource=admin
      JWT_SECRET: verysecurejwtsecret
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      SWAGGER_API_BASE_URL: https://api.swaggerhub.com/
      LICENSE_KEY: ""
    expose:
      - "3001"
    depends_on:
      - mongodb
    networks:
      - sevant-network

  frontend:
    image: analyticsavant/sevant-registry-frontend:latest
    container_name: sevant-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ""
      API_BASE_URL: http://backend:3001
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - sevant-network

  # Required: Hub images use relative API URLs; nginx proxies /manual-specs etc. to backend
  nginx:
    image: nginx:alpine
    container_name: sevant-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - sevant-network

configs:
  nginx_config:
    content: |
      events {
          worker_connections 1024;
      }

      http {
          upstream frontend {
              server frontend:3000;
          }

          upstream backend {
              server backend:3001;
          }

          server {
              listen 80;
              server_name localhost;

              proxy_connect_timeout 300s;
              proxy_send_timeout 300s;
              proxy_read_timeout 300s;

              location ~ ^/(user|specs|role|manual-specs|workflows|solution-architect|context-relationships|license|feature-flags|ddcl|api-clusters|team-specs|system-settings) {
                  proxy_pass http://backend;
                  proxy_http_version 1.1;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
                  proxy_set_header X-Frontend-Request "true";
              }

              location /api/health {
                  proxy_pass http://backend;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Frontend-Request "true";
              }

              location / {
                  proxy_pass http://frontend;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $$http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
                  proxy_cache_bypass $$http_upgrade;
              }
          }
      }

volumes:
  mongodb_data:

networks:
  sevant-network:
    driver: bridge
